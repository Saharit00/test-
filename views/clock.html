<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Clock</title>
</head>

<body class="p-4">
    <h1 class="text-xl font-bold">Current time</h1>
    <button class="btn btn-primary mt-3">Now</button>
    <!-- JS -->
    <script>
        // connect to backend '/now'
        // use 'fetch()'

        // async and await always use together
        async function getTime() {
            try {
                // fetch('http://localhost:3000/now') full ver.
                const response = await fetch('/now'); //short ver.
                // response = response code + body
                // if (response.ok) {
                //     // alert('success');
                //     //convert the response to text
                //     const datetime = await response.text();
                //     document.querySelector('h1').textContent = datetime;
                // } else {
                //     // alert('connection error');
                //     throw Error('connection error');
                // }

                if (!response.ok) {
                    throw Error('connection error');
                }
                const datetime = await response.text();
                document.querySelector('h1').textContent = datetime;
            } catch (error) {
                alert(error);
            }
        }

        //get time 
        // getTime();
        document.querySelector('button').onclick = function(){
            getTime();
        }
    </script>
</body>

</html>
